<!-- Shared sidebar navigation — include in every inner page -->
<style>
  .app-nav {
    position: fixed; left: 0; top: 0; bottom: 0;
    width: 60px;
    background: #080a12;
    border-right: 1px solid #1e2240;
    z-index: 200;
    display: flex; flex-direction: column;
    transition: width 0.3s cubic-bezier(0.16,1,0.3,1);
    overflow: hidden;
  }
  .app-nav:hover { width: 200px; box-shadow: 4px 0 32px rgba(0,0,0,0.5); }

  .nav-logo {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 0 18px 14px;
    text-decoration: none;
    border-bottom: 1px solid #1e2240;
    flex-shrink: 0; overflow: hidden;
  }
  .nav-hex {
    width: 32px; height: 32px; flex-shrink: 0;
    background: linear-gradient(135deg, #6366f1, #7c3aed);
    clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
    display: grid; place-items: center;
    font-size: 13px;
    box-shadow: 0 0 16px #6366f133;
  }
  .nav-brand-wrap { overflow: hidden; }
  .nav-brand {
    font-family: 'Syne', sans-serif; font-weight: 800;
    font-size: 0.75rem; letter-spacing: 0.12em; color: #dde1f5;
    white-space: nowrap;
    opacity: 0; transition: opacity 0.15s 0.12s;
  }
  .nav-sub {
    font-size: 0.6rem; color: #6b7099; letter-spacing: 0.08em;
    text-transform: uppercase; white-space: nowrap;
    opacity: 0; transition: opacity 0.15s 0.12s;
  }
  .app-nav:hover .nav-brand,
  .app-nav:hover .nav-sub { opacity: 1; }

  .nav-section-label {
    font-size: 0.58rem; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: #373b5c;
    padding: 14px 0 4px 20px; white-space: nowrap;
    opacity: 0; transition: opacity 0.12s;
    flex-shrink: 0;
  }
  .app-nav:hover .nav-section-label { opacity: 1; }

  .nav-links { flex: 1; padding: 8px 0; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }

  .nav-link {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 0 9px 17px;
    text-decoration: none; color: #6b7099;
    font-size: 0.8rem; font-weight: 500;
    border-radius: 0 8px 8px 0; margin-right: 8px;
    transition: color 0.15s, background 0.15s, border-color 0.15s;
    white-space: nowrap; overflow: hidden; flex-shrink: 0;
    border-left: 2px solid transparent;
  }
  .nav-link:hover { color: #dde1f5; background: #121525; }
  .nav-link.active {
    color: #818cf8; background: #6366f112;
    border-left-color: #6366f1; padding-left: 15px;
  }
  .nav-icon { width: 22px; text-align: center; flex-shrink: 0; font-size: 0.95rem; }
  .nav-label { opacity: 0; transition: opacity 0.12s 0.1s; }
  .app-nav:hover .nav-label { opacity: 1; }

  .nav-divider { height: 1px; background: #1e2240; margin: 6px 10px; flex-shrink: 0; }

  .nav-back {
    border-top: 1px solid #1e2240;
    flex-shrink: 0; overflow: hidden;
  }
  .nav-back .nav-link { margin: 6px 8px 6px 0; border-radius: 0 8px 8px 0; }

  /* Push main content right of sidebar */
  .page-with-nav { margin-left: 60px; }
</style>
