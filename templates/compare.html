<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare Archives — Vantage</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080a12;--s1:#0d0f1c;--s2:#121525;--s3:#191d31;--border:#1e2240;--border-hi:#2d3260;--text:#dde1f5;--text-dim:#6b7099;--text-faint:#373b5c;--accent:#6366f1;--accent-hi:#818cf8;--accent-glow:#6366f133;--c-crit:#ff3b30;--c-high:#ff6b2b;--c-med:#f59e0b;--c-low:#22d3a5;--c-safe:#22c55e;--radius:12px;--radius-sm:7px;--ease:cubic-bezier(0.16,1,0.3,1)}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6}
    .bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(100px)}
    .blob-1{width:700px;height:700px;background:radial-gradient(circle,#3730a314,transparent 70%);top:-200px;left:0;animation:d1 22s ease-in-out infinite alternate}
    .blob-2{width:500px;height:500px;background:radial-gradient(circle,#7c3aed10,transparent 70%);bottom:-100px;right:0;animation:d2 26s ease-in-out infinite alternate}
    @keyframes d1{to{transform:translate(40px,30px) scale(1.06)}} @keyframes d2{to{transform:translate(-30px,-40px) scale(1.1)}}
    .grid-ov{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,#6366f112 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%)}

    .page{position:relative;z-index:1;margin-left:60px;padding:36px 40px 60px;max-width:1200px}
    .page-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;letter-spacing:0.04em;margin-bottom:6px}
    .page-sub{font-size:0.82rem;color:var(--text-dim);margin-bottom:28px}

    /* Upload row */
    .upload-row{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:stretch;margin-bottom:24px}
    .vs-sep{display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:0.7rem;font-weight:800;letter-spacing:0.12em;color:var(--text-faint);padding-top:28px}
    .drop-card{background:var(--s1);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;display:flex;flex-direction:column;gap:10px;transition:border-color 0.2s}
    .drop-card.has-file{border-color:var(--border-hi)}
    .drop-card-label{font-size:0.65rem;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint)}
    .drop-zone-mini{
      border:1.5px dashed var(--border);border-radius:var(--radius-sm);padding:20px;
      display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;text-align:center;
      transition:border-color 0.2s,background 0.2s;
    }
    .drop-zone-mini:hover,.drop-zone-mini.dragging{border-color:var(--accent);background:var(--s2)}
    .dz-icon{font-size:1.4rem}
    .dz-text strong{font-size:0.82rem;font-weight:500;display:block}
    .dz-text span{font-size:0.72rem;color:var(--text-dim)}
    .file-chip{
      display:none;align-items:center;gap:8px;padding:8px 10px;
      background:var(--s2);border:1px solid var(--border-hi);border-radius:var(--radius-sm);
    }
    .file-chip.visible{display:flex}
    .chip-dot{width:7px;height:7px;border-radius:50%;background:var(--accent-hi);box-shadow:0 0 6px var(--accent);flex-shrink:0}
    .chip-name{flex:1;font-size:0.78rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .chip-size{font-size:0.72rem;color:var(--text-dim);flex-shrink:0}
    .chip-remove{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:0.75rem;padding:2px 4px;border-radius:3px;transition:color 0.15s}
    .chip-remove:hover{color:var(--c-crit)}

    .btn-compare{
      display:block;width:100%;padding:12px;
      background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;
      font-family:inherit;font-size:0.88rem;font-weight:600;letter-spacing:0.04em;
      border:none;border-radius:var(--radius-sm);cursor:pointer;
      box-shadow:0 4px 20px #6366f135;transition:opacity 0.15s,transform 0.15s;
      margin-bottom:24px;
    }
    .btn-compare:hover:not(:disabled){opacity:0.9;transform:translateY(-1px)}
    .btn-compare:disabled{opacity:0.35;cursor:not-allowed}

    /* Progress */
    .progress-wrap{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:10px;display:none}
    .progress-bar{height:100%;background:linear-gradient(90deg,var(--accent),#a855f7,var(--accent));background-size:200%;animation:shimmer 1.4s linear infinite}
    @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}

    /* Results */
    .diff-results{display:none}
    .score-compare{display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center;margin-bottom:24px}
    .score-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center}
    .score-label{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px}
    .score-val{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800}
    .score-name{font-size:0.72rem;color:var(--text-dim);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .score-delta{display:flex;flex-direction:column;align-items:center;gap:4px}
    .delta-arrow{font-size:1.5rem;font-weight:900}
    .delta-val{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
    .delta-lbl{font-size:0.65rem;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.1em}

    .section-hdr{display:flex;align-items:center;gap:8px;margin:20px 0 10px}
    .section-title{font-size:0.65rem;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-faint);white-space:nowrap}
    .section-line{flex:1;height:1px;background:var(--border)}
    .section-badge{font-size:0.68rem;padding:2px 8px;border-radius:999px;border:1px solid var(--border);color:var(--text-faint);background:var(--s2)}

    .diff-table{width:100%;border-collapse:collapse}
    .diff-table th{background:var(--s2);padding:7px 12px;text-align:left;font-size:0.63rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);border-bottom:1px solid var(--border)}
    .diff-table td{padding:7px 12px;border-bottom:1px solid var(--border);font-size:0.78rem;color:var(--text-dim)}
    .diff-table tr:last-child td{border-bottom:none}
    .diff-table tr:hover td{background:#ffffff02}
    .diff-added{border-left:3px solid var(--c-crit)!important}.diff-added td{color:var(--c-crit)!important}
    .diff-removed{border-left:3px solid var(--c-safe)!important}.diff-removed td{color:var(--c-safe)!important}
    .diff-changed td{color:var(--c-med)!important}
    .tag-added{background:#ff3b3015;color:var(--c-crit);padding:1px 6px;border-radius:3px;font-size:0.65rem;font-weight:700}
    .tag-removed{background:#22c55e15;color:var(--c-safe);padding:1px 6px;border-radius:3px;font-size:0.65rem;font-weight:700}
    .tag-changed{background:#f59e0b15;color:var(--c-med);padding:1px 6px;border-radius:3px;font-size:0.65rem;font-weight:700}
    .tag-same{background:var(--s2);color:var(--text-faint);padding:1px 6px;border-radius:3px;font-size:0.65rem;font-weight:700}

    .finding-diff-row{display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;font-size:0.78rem}
    .fd-sev{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 5px;border-radius:3px;flex-shrink:0}
    .fd-check{font-family:'Menlo','Consolas',monospace;flex-shrink:0;color:var(--text)}
    .fd-desc{color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .fd-new{border-left:3px solid var(--c-crit)}.fd-resolved{border-left:3px solid var(--c-safe)}.fd-both{border-left:3px solid var(--border)}
    .fd-sev.critical{background:#ff3b3015;color:var(--c-crit)}.fd-sev.high{background:#ff6b2b15;color:var(--c-high)}.fd-sev.medium{background:#f59e0b15;color:var(--c-med)}.fd-sev.low{background:#22d3a515;color:var(--c-low)}

    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
    @keyframes fade-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
{% include '_nav.html' %}
<div class="bg-layer" aria-hidden="true"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<div class="grid-ov" aria-hidden="true"></div>

<div class="page">
  <div class="page-title">Compare Archives</div>
  <div class="page-sub">Upload two versions of an archive to see what changed between them — new threats, resolved issues, and risk delta.</div>

  <div class="upload-row">
    <!-- File A -->
    <div class="drop-card" id="card-a">
      <div class="drop-card-label">Version A (before)</div>
      <div class="drop-zone-mini" id="dz-a" onclick="document.getElementById('fi-a').click()">
        <div class="dz-icon">📦</div>
        <div class="dz-text"><strong>Drop or click</strong><span>to select archive</span></div>
      </div>
      <input type="file" id="fi-a" accept=".zip,.jar,.apk,.war,.ear,.tar,.tgz,.tar.gz,.tar.bz2,.tbz2,.tar.xz" style="display:none" onchange="setFile('a',this.files[0])" />
      <div class="file-chip" id="chip-a">
        <span class="chip-dot"></span>
        <span class="chip-name" id="chip-name-a"></span>
        <span class="chip-size" id="chip-size-a"></span>
        <button class="chip-remove" onclick="clearFile('a')">✕</button>
      </div>
    </div>

    <div class="vs-sep">VS</div>

    <!-- File B -->
    <div class="drop-card" id="card-b">
      <div class="drop-card-label">Version B (after)</div>
      <div class="drop-zone-mini" id="dz-b" onclick="document.getElementById('fi-b').click()">
        <div class="dz-icon">📦</div>
        <div class="dz-text"><strong>Drop or click</strong><span>to select archive</span></div>
      </div>
      <input type="file" id="fi-b" accept=".zip,.jar,.apk,.war,.ear,.tar,.tgz,.tar.gz,.tar.bz2,.tbz2,.tar.xz" style="display:none" onchange="setFile('b',this.files[0])" />
      <div class="file-chip" id="chip-b">
        <span class="chip-dot"></span>
        <span class="chip-name" id="chip-name-b"></span>
        <span class="chip-size" id="chip-size-b"></span>
        <button class="chip-remove" onclick="clearFile('b')">✕</button>
      </div>
    </div>
  </div>

  <div class="progress-wrap" id="progress-wrap"><div class="progress-bar"></div></div>
  <button class="btn-compare" id="btn-compare" disabled onclick="doCompare()">Compare →</button>

  <div class="diff-results" id="diff-results"></div>
</div>

<script>
  const files = {a: null, b: null};
  const RISK_COLOR = {none:'#373b5c',low:'#22d3a5',medium:'#f59e0b',high:'#ff6b2b',critical:'#ff3b30'};
  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function fmtSize(b){if(!b)return'—';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}

  function setFile(side, file) {
    if (!file) return;
    files[side] = file;
    document.getElementById(`chip-name-${side}`).textContent = file.name;
    document.getElementById(`chip-size-${side}`).textContent = fmtSize(file.size);
    document.getElementById(`chip-${side}`).classList.add('visible');
    document.getElementById(`card-${side}`).classList.add('has-file');
    updateBtn();
  }
  function clearFile(side) {
    files[side] = null;
    document.getElementById(`chip-${side}`).classList.remove('visible');
    document.getElementById(`card-${side}`).classList.remove('has-file');
    document.getElementById(`fi-${side}`).value = '';
    updateBtn();
  }
  function updateBtn() {
    document.getElementById('btn-compare').disabled = !(files.a && files.b);
  }

  async function scanFile(file) {
    const form = new FormData();
    form.append('file', file);
    const resp = await fetch('/analyze', {method:'POST', body:form});
    return resp.json();
  }

  async function doCompare() {
    const btn = document.getElementById('btn-compare');
    btn.disabled = true; btn.textContent = 'Scanning…';
    document.getElementById('progress-wrap').style.display = 'block';

    const [resA, resB] = await Promise.all([scanFile(files.a), scanFile(files.b)]);

    document.getElementById('progress-wrap').style.display = 'none';
    btn.disabled = false; btn.textContent = 'Compare →';
    renderDiff(resA, resB);
  }

  function renderDiff(a, b) {
    const scoreA = a.metrics?.risk_score ?? 0;
    const scoreB = b.metrics?.risk_score ?? 0;
    const delta  = scoreB - scoreA;
    const colorA = RISK_COLOR[(a.metrics?.risk_label||'none').toLowerCase()] || '#373b5c';
    const colorB = RISK_COLOR[(b.metrics?.risk_label||'none').toLowerCase()] || '#373b5c';
    const deltaColor = delta > 5 ? 'var(--c-crit)' : delta < -5 ? 'var(--c-safe)' : 'var(--text-dim)';
    const deltaArrow = delta > 0 ? '↑' : delta < 0 ? '↓' : '→';

    // Findings diff
    const findingsA = new Map((a.findings||[]).map(f => [`${f.check}:${f.filename||''}`, f]));
    const findingsB = new Map((b.findings||[]).map(f => [`${f.check}:${f.filename||''}`, f]));
    const newFindings      = [...findingsB.values()].filter(f => !findingsA.has(`${f.check}:${f.filename||''}`));
    const resolvedFindings = [...findingsA.values()].filter(f => !findingsB.has(`${f.check}:${f.filename||''}`));
    const sharedFindings   = [...findingsB.values()].filter(f =>  findingsA.has(`${f.check}:${f.filename||''}`));

    // File list diff
    const hashesA = new Map((a.metrics?.file_hashes||[]).map(h=>[h.filename,h]));
    const hashesB = new Map((b.metrics?.file_hashes||[]).map(h=>[h.filename,h]));
    const addedFiles   = [...hashesB.keys()].filter(k=>!hashesA.has(k));
    const removedFiles = [...hashesA.keys()].filter(k=>!hashesB.has(k));
    const changedFiles = [...hashesB.keys()].filter(k=>hashesA.has(k)&&hashesA.get(k).sha256!==hashesB.get(k).sha256);

    // MITRE diff
    const mitreA = new Set((a.metrics?.mitre_techniques||[]).map(t=>t.id));
    const mitreB = new Set((b.metrics?.mitre_techniques||[]).map(t=>t.id));
    const newMitre     = [...mitreB].filter(t=>!mitreA.has(t));
    const resolvedMitre= [...mitreA].filter(t=>!mitreB.has(t));

    let html = `
      <!-- Score comparison -->
      <div class="score-compare" style="animation:fade-up 0.4s var(--ease) both">
        <div class="score-card">
          <div class="score-label">Version A</div>
          <div class="score-val" style="color:${colorA}">${scoreA}</div>
          <div class="score-name">${esc(a.filename)}</div>
        </div>
        <div class="score-delta">
          <div class="delta-arrow" style="color:${deltaColor}">${deltaArrow}</div>
          <div class="delta-val" style="color:${deltaColor}">${delta>0?'+':''}${delta}</div>
          <div class="delta-lbl">Risk Delta</div>
        </div>
        <div class="score-card">
          <div class="score-label">Version B</div>
          <div class="score-val" style="color:${colorB}">${scoreB}</div>
          <div class="score-name">${esc(b.filename)}</div>
        </div>
      </div>

      <!-- New findings -->
      <div class="section-hdr"><span class="section-title">New Threats in B</span><div class="section-line"></div><span class="section-badge">${newFindings.length}</span></div>
      ${newFindings.length ? newFindings.map(f=>`
        <div class="finding-diff-row fd-new">
          <span class="fd-sev ${f.severity}">${esc(f.severity)}</span>
          <span class="fd-check">${esc(f.check)}</span>
          <span class="fd-desc">${esc(f.description)}</span>
          <span class="tag-added">NEW</span>
        </div>`).join('') : '<div style="font-size:0.8rem;color:var(--c-safe);padding:8px 0">✓ No new threats introduced</div>'}

      <!-- Resolved findings -->
      <div class="section-hdr"><span class="section-title">Resolved from A</span><div class="section-line"></div><span class="section-badge">${resolvedFindings.length}</span></div>
      ${resolvedFindings.length ? resolvedFindings.map(f=>`
        <div class="finding-diff-row fd-resolved">
          <span class="fd-sev ${f.severity}">${esc(f.severity)}</span>
          <span class="fd-check">${esc(f.check)}</span>
          <span class="fd-desc">${esc(f.description)}</span>
          <span class="tag-removed">FIXED</span>
        </div>`).join('') : '<div style="font-size:0.8rem;color:var(--text-faint);padding:8px 0">No findings resolved</div>'}

      <!-- File changes -->
      <div class="section-hdr"><span class="section-title">File Changes</span><div class="section-line"></div><span class="section-badge">${addedFiles.length+removedFiles.length+changedFiles.length}</span></div>
      <div style="overflow-x:auto;border-radius:var(--radius-sm);border:1px solid var(--border)">
        <table class="diff-table">
          <thead><tr><th>File</th><th>Change</th></tr></thead>
          <tbody>
            ${addedFiles.map(f=>`<tr class="diff-added"><td>${esc(f)}</td><td><span class="tag-added">ADDED</span></td></tr>`).join('')}
            ${removedFiles.map(f=>`<tr class="diff-removed"><td>${esc(f)}</td><td><span class="tag-removed">REMOVED</span></td></tr>`).join('')}
            ${changedFiles.map(f=>`<tr class="diff-changed"><td>${esc(f)}</td><td><span class="tag-changed">MODIFIED</span></td></tr>`).join('')}
            ${!addedFiles.length&&!removedFiles.length&&!changedFiles.length?`<tr><td colspan="2" style="text-align:center;color:var(--text-faint)">No file changes detected</td></tr>`:''}
          </tbody>
        </table>
      </div>

      <!-- MITRE diff -->
      ${newMitre.length||resolvedMitre.length?`
        <div class="section-hdr"><span class="section-title">MITRE ATT&CK Changes</span><div class="section-line"></div></div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${newMitre.map(t=>`<span style="padding:3px 9px;background:#ff3b3015;border:1px solid #ff3b3030;border-radius:6px;font-size:0.72rem;color:var(--c-crit)">+${esc(t)}</span>`).join('')}
          ${resolvedMitre.map(t=>`<span style="padding:3px 9px;background:#22c55e15;border:1px solid #22c55e30;border-radius:6px;font-size:0.72rem;color:var(--c-safe)">−${esc(t)}</span>`).join('')}
        </div>`:''}
    `;

    const dr = document.getElementById('diff-results');
    dr.style.display = 'block';
    dr.innerHTML = html;
    dr.style.animation = 'fade-up 0.4s var(--ease) both';
  }
</script>
</body>
</html>
