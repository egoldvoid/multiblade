<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triage Queue — Multiblade</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#080a12;--s1:#0d0f1c;--s2:#121525;--s3:#191d31;--border:#1e2240;--border-hi:#2d3260;--text:#dde1f5;--text-dim:#6b7099;--text-faint:#373b5c;--accent:#6366f1;--accent-hi:#818cf8;--accent-glow:#6366f133;--c-crit:#ff3b30;--c-high:#ff6b2b;--c-med:#f59e0b;--c-low:#22d3a5;--c-safe:#22c55e;--radius:12px;--radius-sm:7px;--ease:cubic-bezier(0.16,1,0.3,1)}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:14px;line-height:1.6}
    .bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .blob{position:absolute;border-radius:50%;filter:blur(100px)}
    .blob-1{width:700px;height:700px;background:radial-gradient(circle,#3730a314,transparent 70%);top:-200px;left:-100px;animation:d1 22s ease-in-out infinite alternate}
    .blob-2{width:500px;height:500px;background:radial-gradient(circle,#7c3aed10,transparent 70%);bottom:-100px;right:-50px;animation:d2 26s ease-in-out infinite alternate}
    @keyframes d1{to{transform:translate(50px,30px) scale(1.06)}} @keyframes d2{to{transform:translate(-30px,-40px) scale(1.1)}}
    .grid-ov{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,#6366f112 1px,transparent 1px);background-size:32px 32px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%)}

    .page{position:relative;z-index:1;margin-left:60px;display:grid;grid-template-columns:380px 1fr;min-height:100vh}
    .left-col{border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:sticky;top:0;height:100vh}
    .right-col{overflow-y:auto;max-height:100vh}

    .col-header{padding:20px 24px 16px;border-bottom:1px solid var(--border)}
    .col-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.06em;margin-bottom:4px}
    .col-sub{font-size:0.75rem;color:var(--text-dim)}

    /* Drop zone */
    .drop-zone{
      margin:16px;border:1.5px dashed var(--border);border-radius:var(--radius);
      padding:28px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;
      cursor:pointer;text-align:center;
      transition:border-color 0.2s,background 0.2s,box-shadow 0.25s;position:relative;
    }
    .drop-zone:hover,.drop-zone.dragging{border-color:var(--accent);background:var(--s1);box-shadow:0 0 0 3px var(--accent-glow)}
    .drop-zone::before{content:'';position:absolute;inset:0;border-radius:inherit;background:radial-gradient(ellipse 70% 60% at 50% 0%,var(--accent-glow),transparent 70%);opacity:0;transition:opacity 0.3s}
    .drop-zone:hover::before,.drop-zone.dragging::before{opacity:1}
    .drop-icon{font-size:2rem;position:relative;z-index:1}
    .drop-text{position:relative;z-index:1}
    .drop-text strong{font-size:0.88rem;font-weight:600;display:block}
    .drop-text span{font-size:0.75rem;color:var(--text-dim)}
    .drop-hint{font-size:0.7rem;color:var(--text-faint);position:relative;z-index:1}

    .btn-scan-all{
      margin:0 16px 12px;padding:11px 20px;width:calc(100% - 32px);
      background:linear-gradient(135deg,var(--accent),#7c3aed);color:#fff;
      font-family:inherit;font-size:0.85rem;font-weight:600;letter-spacing:0.04em;
      border:none;border-radius:var(--radius-sm);cursor:pointer;
      box-shadow:0 4px 20px #6366f135;transition:opacity 0.15s,transform 0.15s,box-shadow 0.2s;
    }
    .btn-scan-all:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 28px #6366f145}
    .btn-scan-all:disabled{opacity:0.35;cursor:not-allowed;box-shadow:none}

    /* Queue list */
    .queue-list{flex:1;overflow-y:auto;padding:0 16px 16px}
    .queue-empty{padding:24px;text-align:center;color:var(--text-faint);font-size:0.82rem}

    .queue-item{
      display:flex;align-items:center;gap:10px;padding:10px 12px;
      background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-sm);
      margin-bottom:6px;transition:border-color 0.15s;
      animation:slide-up 0.25s var(--ease) both;
    }
    .queue-item.done{border-left:3px solid var(--border);padding-left:9px}
    .queue-item.done.unsafe{border-left-color:var(--c-crit)}
    .queue-item.done.safe-item{border-left-color:var(--c-safe)}
    .q-status-icon{font-size:1rem;flex-shrink:0;width:20px;text-align:center}
    .q-info{flex:1;min-width:0}
    .q-name{font-size:0.8rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .q-meta{font-size:0.68rem;color:var(--text-faint)}
    .q-score{font-family:'Syne',sans-serif;font-size:0.9rem;font-weight:700;flex-shrink:0}
    .q-remove{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:0.75rem;padding:2px 5px;border-radius:3px;transition:color 0.15s,background 0.15s}
    .q-remove:hover{color:var(--c-crit);background:var(--s2)}

    /* Progress bar */
    .scan-bar-wrap{height:2px;background:var(--border);margin:0 16px 2px;border-radius:1px;overflow:hidden}
    .scan-bar{height:100%;background:linear-gradient(90deg,var(--accent),#a855f7,var(--accent));background-size:200%;animation:shimmer 1.4s linear infinite}
    @keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
    .scan-info-bar{display:flex;justify-content:space-between;align-items:center;padding:0 16px 10px;font-size:0.72rem;color:var(--text-faint)}

    /* Results column */
    .results-inner{padding:28px 32px 60px}
    .results-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;color:var(--text-faint)}
    .results-empty-icon{font-size:3rem;opacity:0.3;margin-bottom:12px}

    .summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px}
    .sum-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center}
    .sum-val{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;line-height:1}
    .sum-lbl{font-size:0.63rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-faint);margin-top:3px}

    .result-card{
      background:var(--s1);border:1px solid var(--border);border-radius:var(--radius-sm);
      border-left-width:3px;margin-bottom:8px;overflow:hidden;
      animation:slide-up 0.3s var(--ease) both;cursor:pointer;
    }
    .result-card:hover{background:var(--s2)}
    .rc-head{display:flex;align-items:center;gap:10px;padding:12px 14px}
    .rc-risk{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;flex-shrink:0}
    .rc-info{flex:1;min-width:0}
    .rc-name{font-size:0.82rem;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .rc-meta{font-size:0.7rem;color:var(--text-dim)}
    .rc-sev{font-size:0.62rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:2px 7px;border-radius:4px;flex-shrink:0}
    .rc-chev{font-size:0.6rem;color:var(--text-faint);flex-shrink:0;transition:transform 0.2s}
    .result-card.open .rc-chev{transform:rotate(180deg)}
    .rc-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
    .result-card.open .rc-body{display:block;padding-top:10px}
    .finding-mini{display:flex;align-items:center;gap:7px;padding:5px 8px;background:var(--s2);border:1px solid var(--border);border-radius:4px;margin-bottom:4px;font-size:0.75rem}
    .fm-sev{font-size:0.6rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:1px 5px;border-radius:3px;flex-shrink:0}
    .fm-check{font-family:'Menlo','Consolas',monospace;color:var(--text);flex-shrink:0}
    .fm-desc{color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

    @keyframes slide-up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

    .sev-crit{border-left-color:var(--c-crit)} .sev-high{border-left-color:var(--c-high)} .sev-med{border-left-color:var(--c-med)} .sev-low{border-left-color:var(--c-low)} .sev-safe{border-left-color:var(--c-safe)}
    .rc-sev.crit{background:#ff3b3015;color:var(--c-crit)} .rc-sev.high{background:#ff6b2b15;color:var(--c-high)} .rc-sev.med{background:#f59e0b15;color:var(--c-med)} .rc-sev.low{background:#22d3a515;color:var(--c-low)} .rc-sev.safe{background:#22c55e15;color:var(--c-safe)}
    .fm-sev.critical{background:#ff3b3015;color:var(--c-crit)}.fm-sev.high{background:#ff6b2b15;color:var(--c-high)}.fm-sev.medium{background:#f59e0b15;color:var(--c-med)}.fm-sev.low{background:#22d3a515;color:var(--c-low)}
  </style>
</head>
<body>
{% include '_nav.html' %}
<div class="bg-layer" aria-hidden="true"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<div class="grid-ov" aria-hidden="true"></div>

<div class="page">
  <!-- Left: queue -->
  <div class="left-col">
    <div class="col-header">
      <div class="col-title">Triage Queue</div>
      <div class="col-sub">Drop multiple archives — results ranked by risk</div>
    </div>

    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
      <div class="drop-icon">📂</div>
      <div class="drop-text"><strong>Drop archives here</strong><span>or click to browse</span></div>
      <div class="drop-hint">zip · jar · apk · war · tar · tar.gz · tgz</div>
    </div>
    <input type="file" id="file-input" multiple accept=".zip,.jar,.apk,.war,.ear,.tar,.tgz,.tar.gz,.tar.bz2,.tbz2,.tar.xz" style="display:none" />

    <div class="scan-bar-wrap" id="scan-bar-wrap" style="opacity:0"><div class="scan-bar"></div></div>
    <div class="scan-info-bar" id="scan-info-bar" style="opacity:0">
      <span id="scan-progress-label">Scanning…</span>
      <span id="scan-progress-frac">0 / 0</span>
    </div>

    <button class="btn-scan-all" id="btn-scan" disabled onclick="startScan()">Scan All →</button>

    <div class="queue-list" id="queue-list">
      <div class="queue-empty">Add files above to begin</div>
    </div>
  </div>

  <!-- Right: results -->
  <div class="right-col">
    <div class="results-inner" id="results-inner">
      <div class="results-empty">
        <div class="results-empty-icon">⚡</div>
        <p>Scan results will appear here, ranked by risk score</p>
      </div>
    </div>
  </div>
</div>

<script>
  const RISK_COLOR = {none:'#373b5c',low:'#22d3a5',medium:'#f59e0b',high:'#ff6b2b',critical:'#ff3b30'};
  const RISK_LEFT  = {none:'sev-safe',low:'sev-low',medium:'sev-med',high:'sev-high',critical:'sev-crit'};
  const SEV_ORDER  = ['critical','high','medium','low','info'];
  let queue = [];    // {file, status:'pending'|'scanning'|'done'|'error', result:null}
  let scanning = false;

  function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
  function fmtSize(b){if(!b)return'—';if(b<1024)return b+' B';if(b<1048576)return(b/1024).toFixed(1)+' KB';return(b/1048576).toFixed(1)+' MB'}

  const dropZone = document.getElementById('drop-zone');
  const fileInput= document.getElementById('file-input');

  fileInput.addEventListener('change', () => { addFiles(Array.from(fileInput.files)); fileInput.value=''; });

  let dragCounter=0;
  document.addEventListener('dragenter',e=>{e.preventDefault();dragCounter++;dropZone.classList.add('dragging')});
  document.addEventListener('dragleave',()=>{dragCounter--;if(dragCounter<=0){dragCounter=0;dropZone.classList.remove('dragging')}});
  document.addEventListener('dragover',e=>e.preventDefault());
  document.addEventListener('drop',e=>{
    e.preventDefault();dragCounter=0;dropZone.classList.remove('dragging');
    addFiles(Array.from(e.dataTransfer.files));
  });

  const ACCEPTED_EXT = new Set(['.zip','.jar','.apk','.war','.ear','.tar','.tgz','.tbz2','.txz','.gz','.bz2','.xz']);
  function isAccepted(n){const l=n.toLowerCase();if(l.endsWith('.tar.gz')||l.endsWith('.tar.bz2')||l.endsWith('.tar.xz'))return true;const d=l.lastIndexOf('.');return d!==-1&&ACCEPTED_EXT.has(l.slice(d))}

  function addFiles(files){
    files.filter(f=>isAccepted(f.name)&&!queue.find(q=>q.file.name===f.name&&q.file.size===f.size))
      .forEach(f=>queue.push({file:f,status:'pending',result:null}));
    renderQueue();
    document.getElementById('btn-scan').disabled = scanning || !queue.some(q=>q.status==='pending');
  }

  function renderQueue(){
    const list=document.getElementById('queue-list');
    if(!queue.length){list.innerHTML='<div class="queue-empty">Add files above to begin</div>';return}
    list.innerHTML='';
    queue.forEach((item,i)=>{
      const div=document.createElement('div');
      div.className='queue-item'+(item.status==='done'?' done'+(item.result?.safe?' safe-item':' unsafe'):'');
      div.id=`qi-${i}`;
      const icon = item.status==='pending'?'⏳':item.status==='scanning'?'🔄':item.status==='done'?(item.result?.safe?'✅':'🔴'):'❌';
      const meta = item.status==='done'&&item.result
        ? `Risk ${item.result.metrics?.risk_score??'?'} · ${item.result.findings?.length??0} findings`
        : item.status==='error' ? (item.error||'Error') : fmtSize(item.file.size);
      const color = item.result ? (RISK_COLOR[(item.result.metrics?.risk_label||'none').toLowerCase()]||'#373b5c') : 'var(--text-faint)';
      div.innerHTML=`
        <span class="q-status-icon">${icon}</span>
        <div class="q-info">
          <div class="q-name" title="${esc(item.file.name)}">${esc(item.file.name)}</div>
          <div class="q-meta">${esc(meta)}</div>
        </div>
        ${item.result?`<span class="q-score" style="color:${color}">${item.result.metrics?.risk_score??'?'}</span>`:''}
        ${item.status==='pending'?`<button class="q-remove" onclick="removeItem(${i})">✕</button>`:''}
      `;
      list.appendChild(div);
    });
  }

  function removeItem(i){queue.splice(i,1);renderQueue();document.getElementById('btn-scan').disabled=scanning||!queue.some(q=>q.status==='pending')}

  async function startScan(){
    if(scanning) return;
    scanning=true;
    document.getElementById('btn-scan').disabled=true;
    const pending=queue.filter(q=>q.status==='pending');
    const total=pending.length;
    let done=0;

    document.getElementById('scan-bar-wrap').style.opacity='1';
    document.getElementById('scan-info-bar').style.opacity='1';

    for(const item of pending){
      item.status='scanning';
      renderQueue();
      document.getElementById('scan-progress-label').textContent=`Scanning ${item.file.name}…`;
      document.getElementById('scan-progress-frac').textContent=`${done+1} / ${total}`;

      const form=new FormData();
      form.append('file',item.file);
      try{
        const resp=await fetch('/analyze',{method:'POST',body:form});
        const data=await resp.json();
        item.status='done';
        item.result=data;
      }catch(e){
        item.status='error';
        item.error=e.message;
      }
      done++;
      renderQueue();
    }

    scanning=false;
    document.getElementById('scan-bar-wrap').style.opacity='0';
    document.getElementById('scan-info-bar').style.opacity='0';
    document.getElementById('scan-progress-label').textContent='Done';
    renderResults();
  }

  function renderResults(){
    const ri=document.getElementById('results-inner');
    const done=queue.filter(q=>q.status==='done'&&q.result);
    if(!done.length){ri.innerHTML='<div class="results-empty"><div class="results-empty-icon" style="opacity:0.3">⚡</div><p>No results yet.</p></div>';return}

    // Sort by risk score desc
    const sorted=[...done].sort((a,b)=>(b.result.metrics?.risk_score||0)-(a.result.metrics?.risk_score||0));

    const total=sorted.length;
    const unsafe=sorted.filter(d=>!d.result.safe).length;
    const critCount=sorted.filter(d=>(d.result.metrics?.risk_label||'').toUpperCase()==='CRITICAL').length;
    const avgRisk=Math.round(sorted.reduce((s,d)=>s+(d.result.metrics?.risk_score||0),0)/total);

    let html=`
      <div style="margin-bottom:20px">
        <div style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;letter-spacing:0.06em;margin-bottom:14px">Results — ranked by risk</div>
        <div class="summary-bar">
          <div class="sum-card"><div class="sum-val">${total}</div><div class="sum-lbl">Scanned</div></div>
          <div class="sum-card"><div class="sum-val" style="color:${unsafe>0?'var(--c-crit)':'var(--c-safe)'}">${unsafe}</div><div class="sum-lbl">Unsafe</div></div>
          <div class="sum-card"><div class="sum-val" style="color:${critCount>0?'var(--c-crit)':'var(--text-faint)'}">${critCount}</div><div class="sum-lbl">Critical</div></div>
          <div class="sum-card"><div class="sum-val">${avgRisk}</div><div class="sum-lbl">Avg Risk</div></div>
        </div>
      </div>`;

    sorted.forEach((item,idx)=>{
      const r     = item.result;
      const label = (r.metrics?.risk_label||'none').toLowerCase();
      const color = RISK_COLOR[label]||'#373b5c';
      const lsev  = RISK_LEFT[label]||'sev-safe';
      const sev   = r.max_severity||'';
      const sevCls= {critical:'crit',high:'high',medium:'med',low:'low',none:'safe'}[label]||'safe';
      const findings=(r.findings||[]).slice(0,5);

      html+=`
        <div class="result-card ${lsev}" id="rc-${idx}" onclick="this.classList.toggle('open')">
          <div class="rc-head">
            <div class="rc-risk" style="color:${color}">${r.metrics?.risk_score??'?'}</div>
            <div class="rc-info">
              <div class="rc-name" title="${esc(r.filename)}">${esc(r.filename)}</div>
              <div class="rc-meta">${(r.findings||[]).length} findings · ${fmtSize(r.filesize)}</div>
            </div>
            <span class="rc-sev ${sevCls}">${sev||'SAFE'}</span>
            <span class="rc-chev">▼</span>
          </div>
          <div class="rc-body">
            ${findings.map(f=>`
              <div class="finding-mini">
                <span class="fm-sev ${f.severity}">${esc(f.severity)}</span>
                <span class="fm-check">${esc(f.check)}</span>
                <span class="fm-desc">${esc(f.description)}</span>
              </div>`).join('')}
            ${(r.findings||[]).length>5?`<div style="font-size:0.72rem;color:var(--text-faint);text-align:center;padding:4px">+${r.findings.length-5} more — view in <a href="/history" style="color:var(--accent-hi);text-decoration:none">History</a></div>`:''}
            ${r.findings?.length===0?'<div style="font-size:0.8rem;color:var(--c-safe);text-align:center;padding:8px">✓ No threats detected</div>':''}
          </div>
        </div>`;
      html+='\n';
    });

    ri.innerHTML=html;
  }
</script>
</body>
</html>
